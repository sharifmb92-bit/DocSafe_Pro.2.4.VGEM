<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DocSafe">

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1161/1161388.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1161/1161388.png">
    
    <title>DocSafe 🛡️ Menorca Cloud</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #0f172a; color: #f1f5f9; font-family: system-ui, sans-serif; overflow-x: hidden; padding-top: env(safe-area-inset-top); }
        .card-doc { background: #1e293b; border-radius: 1.5rem; border: 1px solid #334155; }
        .expiry-warning { border-left: 6px solid #ef4444; background: #271017; }
        .nomina-style { border-left: 6px solid #22c55e; }
        input, select { background: #0f172a !important; border: 1px solid #334155 !important; color: white !important; }
        .loading-overlay { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { background-color: #3b82f6 !important; color: white !important; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .thumb-img { object-fit: cover; width: 100%; height: 100%; border-radius: 1rem; }
    </style>
</head>
<body x-data="docApp()" x-init="init()" class="pb-24">

    <!-- MOTOR PWA AVANZADO (Intercepta archivos enviados desde otras Apps) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                self.addEventListener('install', e => e.waitUntil(self.skipWaiting()));
                self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));

                self.addEventListener('fetch', event => {
                    // Si otra app nos manda un archivo, lo atrapamos aquí
                    if (event.request.method === 'POST' && event.request.url.includes('share-target')) {
                        event.respondWith((async () => {
                            try {
                                const formData = await event.request.formData();
                                const file = formData.get('shared_file');
                                if (file) {
                                    const cache = await caches.open('docsafe-share');
                                    await cache.put('/shared-file', new Response(file, {
                                        headers: { 'Content-Type': file.type }
                                    }));
                                }
                            } catch (e) { console.error('Error recibiendo archivo:', e); }
                            
                            // Redirigimos a la app principal para que procese el archivo
                            return Response.redirect('./?shared=1', 303);
                        })());
                    }
                });
                `;
                const blob = new Blob([swCode], {type: 'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(console.error);
            });
        }
    </script>

    <!-- PANTALLA DE CARGA -->
    <div x-show="loading" class="fixed inset-0 z-[100] loading-overlay flex flex-col items-center justify-center p-8 text-center" x-transition x-cloak>
        <div class="relative flex items-center justify-center mb-8">
            <div class="animate-spin rounded-full h-24 w-24 border-t-4 border-blue-500"></div>
            <span class="absolute material-symbols-outlined text-4xl text-blue-500">shield</span>
        </div>
        <p class="text-xl font-black text-white uppercase tracking-widest mb-2" x-text="statusMsg"></p>
        <p class="text-blue-400 font-bold text-sm">Cifrando y guardando en base de datos...</p>
    </div>

    <!-- VISOR DE DOCUMENTOS -->
    <div x-show="docViewer" class="fixed inset-0 z-[200] bg-black/95 flex flex-col backdrop-blur-xl" x-transition x-cloak>
        <div class="p-4 flex justify-between items-center border-b border-white/10 bg-slate-900">
            <h3 class="text-white font-black truncate max-w-[70%]" x-text="docActual?.nombre"></h3>
            <button @click="docViewer = false; docActual = null" class="bg-slate-800 text-white p-3 rounded-full hover:bg-red-500 transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div class="flex-grow overflow-auto p-2 flex items-center justify-center">
            <template x-if="docActual && !docActual.esPDF">
                <img :src="docActual.dataBase64" class="max-w-full rounded-lg shadow-2xl">
            </template>
            <template x-if="docActual && docActual.esPDF">
                <iframe :src="docActual.dataBase64" class="w-full h-full rounded-lg bg-white"></iframe>
            </template>
        </div>
    </div>

    <header class="p-6 flex justify-between items-center bg-slate-900/90 backdrop-blur-md sticky top-0 z-10 border-b border-blue-500/20">
        <div>
            <div class="flex items-center gap-2">
                <h1 class="text-3xl font-black tracking-tighter italic text-white">Doc<span class="text-blue-500">Safe</span></h1>
            </div>
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] mt-1">Caja Fuerte • Menorca Cloud</p>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <p class="text-[10px] font-black uppercase tracking-widest" :class="cloudStatus.includes('✅') ? 'text-blue-400' : 'text-orange-500'" x-text="cloudStatus"></p>
            </div>
            <button @click="showEditor = !showEditor" class="bg-blue-600 p-4 rounded-2xl shadow-[0_0_20px_rgba(37,99,235,0.4)] active:scale-90 transition-transform">
                <span class="material-symbols-outlined text-white font-black" x-text="showEditor ? 'close' : 'add_circle'"></span>
            </button>
        </div>
    </header>

    <main class="p-4 space-y-6">
        
        <!-- PANEL DE SUBIDA -->
        <section x-show="showEditor" x-transition x-cloak class="card-doc p-6 space-y-5 shadow-2xl border-blue-500/40">
            <h2 class="text-xs font-black text-blue-400 uppercase tracking-widest flex items-center gap-2"><span class="material-symbols-outlined">lock</span> Encriptar Nuevo Archivo</h2>
            <div class="space-y-4">
                
                <!-- AVISO DE ARCHIVO RECIBIDO DESDE OTRA APP -->
                <template x-if="archivoPendiente">
                    <div class="bg-green-500/20 border border-green-500/50 p-4 rounded-2xl flex items-center gap-3">
                        <span class="material-symbols-outlined text-green-400 text-3xl">task</span>
                        <div class="flex-grow">
                            <h4 class="text-green-400 font-black text-[10px] uppercase tracking-widest">Archivo Recibido Externo</h4>
                            <p class="text-white text-sm truncate max-w-[200px]" x-text="archivoPendiente.file.name || 'Documento adjunto'"></p>
                        </div>
                        <button @click="cancelarCompartido()" class="text-red-400 p-2"><span class="material-symbols-outlined">close</span></button>
                    </div>
                </template>

                <input type="text" x-model="nuevo.nombre" placeholder="Nombre (Ej: Nómina Mayo, Cuadrante...)" class="w-full p-4 rounded-2xl text-base font-bold outline-none focus:ring-2 ring-blue-500">
                <div class="grid grid-cols-2 gap-3">
                    <select x-model="nuevo.categoria" class="p-4 rounded-2xl text-xs font-bold outline-none uppercase">
                        <template x-for="cat in categorias.filter(c => c !== 'TODOS')">
                            <option :value="cat" x-text="cat"></option>
                        </template>
                    </select>
                    <input type="date" x-model="nuevo.fecha" class="p-4 rounded-2xl text-xs font-bold outline-none uppercase">
                </div>
                
                <!-- BOTONES NORMALES (Se ocultan si viene archivo de fuera) -->
                <template x-if="!archivoPendiente">
                    <div class="grid grid-cols-2 gap-4 pt-2">
                        <button @click="$refs.camInput.click()" class="py-5 bg-blue-600 rounded-[1.5rem] font-black text-white uppercase text-[11px] flex flex-col items-center justify-center gap-2 shadow-lg active:bg-blue-700 transition-colors">
                            <span class="material-symbols-outlined text-3xl">photo_camera</span> HACER FOTO
                        </button>
                        <button @click="$refs.fileInput.click()" class="py-5 bg-slate-700 rounded-[1.5rem] font-black text-white uppercase text-[11px] flex flex-col items-center justify-center gap-2 border border-white/10 active:bg-slate-600 transition-colors">
                            <span class="material-symbols-outlined text-3xl">upload_file</span> ARCHIVO / PDF
                        </button>
                    </div>
                </template>

                <!-- BOTÓN DE GUARDADO DIRECTO (Aparece cuando viene archivo de fuera) -->
                <template x-if="archivoPendiente">
                    <div class="pt-2">
                        <button @click="procesarArchivoPendiente()" class="w-full py-5 bg-green-600 rounded-[1.5rem] font-black text-white uppercase text-[11px] flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(34,197,94,0.4)] active:bg-green-700 transition-colors">
                            <span class="material-symbols-outlined text-2xl">save</span> CONFIRMAR Y GUARDAR
                        </button>
                    </div>
                </template>

                <input type="file" x-ref="camInput" class="hidden" accept="image/*" capture="environment" @change="procesarInputLocal($event, false)">
                <input type="file" x-ref="fileInput" class="hidden" accept="image/*,application/pdf" @change="procesarInputLocal($event, null)">
            </div>
        </section>

        <!-- FILTROS -->
        <div class="flex gap-2 overflow-x-auto no-scrollbar py-2 border-b border-white/5 pb-4">
            <template x-for="cat in categorias">
                <button @click="filtro = cat" 
                        :class="filtro === cat ? 'active-tab' : 'bg-slate-800 text-slate-400 border border-white/5'"
                        class="px-6 py-3 rounded-2xl text-[11px] font-black uppercase transition-all flex-shrink-0 tracking-widest" x-text="cat"></button>
            </template>
        </div>

        <!-- LISTA DE DOCUMENTOS -->
        <div class="grid gap-4">
            <template x-if="docsFiltrados.length === 0">
                <div class="text-center p-10 text-slate-600 flex flex-col items-center">
                    <span class="material-symbols-outlined text-6xl mb-4 opacity-50">inventory_2</span>
                    <p class="font-bold">No hay archivos en esta categoría.</p>
                </div>
            </template>

            <template x-for="doc in docsFiltrados" :key="doc.id">
                <div class="card-doc p-4 flex items-center justify-between active:scale-[0.98] transition-transform overflow-hidden relative" 
                     :class="{'expiry-warning': esCaducado(doc.fecha), 'nomina-style': doc.categoria === 'NÓMINAS'}">
                    
                    <div class="flex items-center gap-4 flex-grow cursor-pointer" @click="abrirVisor(doc)">
                        <div class="w-16 h-16 rounded-xl overflow-hidden bg-slate-800 flex items-center justify-center border border-white/10 flex-shrink-0 relative">
                            <template x-if="!doc.esPDF && doc.dataBase64">
                                <img :src="doc.dataBase64" class="thumb-img opacity-80">
                            </template>
                            <template x-if="doc.esPDF || !doc.dataBase64">
                                <span class="material-symbols-outlined text-3xl text-red-400">picture_as_pdf</span>
                            </template>
                            <div class="absolute bottom-0 left-0 right-0 bg-black/60 text-center py-0.5 backdrop-blur-sm">
                                <span class="text-[8px] font-black text-white uppercase tracking-widest" x-text="doc.esPDF ? 'PDF' : 'IMG'"></span>
                            </div>
                        </div>

                        <div class="w-full">
                            <h3 class="font-black text-white text-sm md:text-base leading-tight mb-1" x-text="doc.nombre"></h3>
                            <div class="flex items-center gap-2">
                                <span class="text-[9px] font-black bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-md uppercase" x-text="doc.categoria"></span>
                                <span class="text-slate-600 text-xs">•</span>
                                <p class="text-[10px] font-bold" :class="esCaducado(doc.fecha) ? 'text-red-400' : 'text-slate-400'" x-text="doc.fecha ? formatDate(doc.fecha) : 'Sin caducidad'"></p>
                            </div>
                        </div>
                    </div>
                    
                    <button @click.stop="borrar(doc)" class="text-slate-600 p-4 hover:text-red-500 transition-colors z-10 flex-shrink-0">
                        <span class="material-symbols-outlined text-2xl">delete</span>
                    </button>
                </div>
            </template>
        </div>
    </main>

    <script>
        // CONFIGURACIÓN FIREBASE (Pon tus datos aquí)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO_ID",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function docApp() {
            return {
                showEditor: false, loading: false, statusMsg: '', cloudStatus: 'Offline',
                filtro: 'TODOS', categorias:['TODOS', 'BUS', 'NÓMINAS', 'SALUD', 'PERSONALES', 'OTROS'],
                docs:[], nuevo: { nombre: '', categoria: 'BUS', fecha: '', esPDF: false },
                docViewer: false, docActual: null,
                archivoPendiente: null,
                
                init() {
                    // COMPROBAR SI LA APP SE HA ABIERTO DESDE EL MENÚ "COMPARTIR"
                    if (window.location.search.includes('shared=1')) {
                        caches.open('docsafe-share').then(cache => {
                            cache.match('/shared-file').then(response => {
                                if (response) {
                                    const isPDF = response.headers.get('Content-Type').includes('pdf');
                                    response.blob().then(blob => {
                                        const file = new File([blob], "Archivo_Compartido", { type: blob.type });
                                        this.archivoPendiente = { file, isPDF };
                                        
                                        // Rellenar datos automáticos
                                        const hoy = new Date();
                                        this.nuevo.nombre = "Recibido " + hoy.toLocaleDateString();
                                        this.showEditor = true;
                                        
                                        // Limpiar caché y URL
                                        cache.delete('/shared-file');
                                        window.history.replaceState({}, document.title, window.location.pathname);
                                    });
                                }
                            });
                        });
                    }

                    // Cargar caché offline
                    this.docs = JSON.parse(localStorage.getItem('docsafe_cache_v2')) ||[];
                    
                    firebase.auth().signInAnonymously().then(() => {
                        this.cloudStatus = 'Sincronizando...';
                        db.collection("docsafe_b64").orderBy("createdAt", "desc").onSnapshot(snap => {
                            this.docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                            localStorage.setItem('docsafe_cache_v2', JSON.stringify(this.docs));
                            this.cloudStatus = 'Online ✅';
                        }, err => {
                            this.cloudStatus = 'Modo Offline 🛡️';
                        });
                    }).catch(() => { this.cloudStatus = 'Modo Offline 🛡️'; });
                },

                abrirVisor(doc) {
                    this.docActual = doc;
                    this.docViewer = true;
                },

                cancelarCompartido() {
                    this.archivoPendiente = null;
                    this.nuevo.nombre = '';
                },

                procesarInputLocal(event, manualPDF) {
                    const file = event.target.files[0];
                    if(!file) return;
                    const esPDF = manualPDF !== null ? manualPDF : (file.type === 'application/pdf');
                    this.ejecutarSubida(file, esPDF);
                    event.target.value = '';
                },

                procesarArchivoPendiente() {
                    if(!this.archivoPendiente) return;
                    this.ejecutarSubida(this.archivoPendiente.file, this.archivoPendiente.isPDF);
                },

                async ejecutarSubida(file, esPDF) {
                    if(!this.nuevo.nombre) {
                        alert("⚠️ Por favor, ponle un nombre al archivo antes de adjuntarlo.");
                        return;
                    }
                    
                    this.loading = true;
                    this.statusMsg = "Procesando...";
                    let base64Data = "";

                    try {
                        if (esPDF) {
                            if (file.size > 800 * 1024) {
                                alert("⚠️ El PDF es muy grande para la Bóveda Rápida. Hazle una foto o redúcelo (Máx: 800KB).");
                                this.loading = false;
                                return;
                            }
                            this.statusMsg = "Leyendo PDF...";
                            base64Data = await this.leerComoBase64(file);
                        } else {
                            this.statusMsg = "Comprimiendo Imagen...";
                            base64Data = await this.comprimirImagen(file);
                        }

                        this.statusMsg = "Guardando en Nube...";
                        await db.collection("docsafe_b64").add({
                            nombre: this.nuevo.nombre,
                            categoria: this.nuevo.categoria,
                            fecha: this.nuevo.fecha,
                            esPDF: esPDF,
                            dataBase64: base64Data,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });

                        // Limpiar campos y cerrar modal
                        this.nuevo = { nombre: '', categoria: 'BUS', fecha: '', esPDF: false };
                        this.showEditor = false;
                        this.archivoPendiente = null;

                    } catch(err) {
                        console.error(err);
                        alert("❌ Hubo un error al guardar el archivo.");
                    } finally {
                        this.loading = false;
                    }
                },

                comprimirImagen(file) {
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.readAsDataURL(file);
                        reader.onload = (e) => {
                            const img = new Image();
                            img.src = e.target.result;
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                const MAX_WIDTH = 1200;
                                const MAX_HEIGHT = 1200;
                                let width = img.width;
                                let height = img.height;

                                if (width > height) {
                                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                                } else {
                                    if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                                }
                                canvas.width = width; canvas.height = height;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0, width, height);
                                resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                            };
                        };
                    });
                },

                leerComoBase64(file) {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.readAsDataURL(file);
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = error => reject(error);
                    });
                },

                async borrar(doc) {
                    if(confirm("¿Destruir archivo de la bóveda definitivamente?")) {
                        await db.collection("docsafe_b64").doc(doc.id).delete();
                    }
                },

                formatDate(f) { 
                    if(!f) return ''; 
                    const [y, m, d] = f.split('-'); 
                    return `${d}/${m}/${y}`; 
                },
                
                get docsFiltrados() { 
                    let lista = this.filtro === 'TODOS' ? this.docs : this.docs.filter(d => d.categoria === this.filtro); 
                    return lista.sort((a, b) => {
                        const cadA = this.esCaducado(a.fecha);
                        const cadB = this.esCaducado(b.fecha);
                        if(cadA && !cadB) return 1;
                        if(!cadA && cadB) return -1;
                        return 0;
                    });
                },

                esCaducado(f) { 
                    if(!f || this.filtro === 'NÓMINAS') return false; 
                    return new Date(f) < new Date().setHours(0,0,0,0); 
                }
            }
        }
    </script>
</body>
</html>
